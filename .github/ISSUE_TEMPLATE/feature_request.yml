name: Feature request
description: Suggest a focused improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user need would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would you like to change?
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy impact
      description: Would this store, transmit, or infer any user data?
